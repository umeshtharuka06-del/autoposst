# Portainer Stacks compatible — no env_file, no .env required.
# All ${VARS} below are supplied as Portainer Environment Variables (or shell
# env for CLI deploys). Docker Compose v2 syntax.
#
# REQUIRED variables:
#   TELEGRAM_BOT_TOKEN, TELEGRAM_ALLOWED_USER_IDS, OPENAI_API_KEY,
#   POSTGRES_PASSWORD, REDIS_PASSWORD, ENCRYPTION_KEY (64 hex chars)
# OPTIONAL variables (defaults shown inline):
#   POSTGRES_USER, POSTGRES_DB, OPENAI_MODEL, OPENAI_MAX_OUTPUT_TOKENS,
#   FACEBOOK_GRAPH_VERSION, PINTEREST_API_BASE, REDDIT_CLIENT_ID,
#   REDDIT_CLIENT_SECRET, REDDIT_REFRESH_TOKEN, REDDIT_USER_AGENT,
#   MEDIA_COMPRESS_THRESHOLD_BYTES, THUMBNAIL_WIDTH, JOB_ATTEMPTS,
#   JOB_BACKOFF_MS, WORKER_CONCURRENCY, LOG_LEVEL, TZ

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-autopost}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-autopost}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-autopost} -d ${POSTGRES_DB:-autopost}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}", "--appendonly", "yes"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    image: autopost-app:latest
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TZ: ${TZ:-UTC}

      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN is required}
      TELEGRAM_ALLOWED_USER_IDS: ${TELEGRAM_ALLOWED_USER_IDS:?TELEGRAM_ALLOWED_USER_IDS is required}

      DATABASE_URL: postgresql://${POSTGRES_USER:-autopost}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-autopost}?schema=public

      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}

      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY is required (64 hex chars)}

      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY is required}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      OPENAI_MAX_OUTPUT_TOKENS: ${OPENAI_MAX_OUTPUT_TOKENS:-4096}

      FACEBOOK_GRAPH_VERSION: ${FACEBOOK_GRAPH_VERSION:-v21.0}
      PINTEREST_API_BASE: ${PINTEREST_API_BASE:-https://api.pinterest.com/v5}

      REDDIT_CLIENT_ID: ${REDDIT_CLIENT_ID:-}
      REDDIT_CLIENT_SECRET: ${REDDIT_CLIENT_SECRET:-}
      REDDIT_REFRESH_TOKEN: ${REDDIT_REFRESH_TOKEN:-}
      REDDIT_USER_AGENT: ${REDDIT_USER_AGENT:-autopost/1.0}

      MEDIA_STORAGE_PATH: /app/storage/media
      MEDIA_COMPRESS_THRESHOLD_BYTES: ${MEDIA_COMPRESS_THRESHOLD_BYTES:-4194304}
      THUMBNAIL_WIDTH: ${THUMBNAIL_WIDTH:-512}

      JOB_ATTEMPTS: ${JOB_ATTEMPTS:-5}
      JOB_BACKOFF_MS: ${JOB_BACKOFF_MS:-15000}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-3}
    volumes:
      - mediadata:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

volumes:
  pgdata:
  redisdata:
  mediadata:
